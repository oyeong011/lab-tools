name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml
      - name: Run smoke tests
        run: python3 -m unittest discover -s tests -v
